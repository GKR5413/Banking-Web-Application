# Development Environment Configuration

# Disable security for local development (remove in production)
server.servlet.session.cookie.secure=false

# Enable detailed error messages for debugging
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

# Logging levels for development
logging.level.root=INFO
logging.level.com.Bank.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Development database (use .env file for credentials)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/Testing?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
